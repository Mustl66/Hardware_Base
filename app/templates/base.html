<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Hardware Base{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>

  <!-- ── Top bar ──────────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="chat-toggle-btn" id="chat-toggle-btn" title="Toggle AI Chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Chat</span>
      </button>
      <a href="/" class="brand">⚙ Hardware Base</a>
    </div>
    <nav>
      <a href="/">Library</a>
      <a href="/upload">+ Add Datasheet</a>
    </nav>
  </header>

  <!-- ══════════════════════════════════════════════════════════════════════════
       CHAT PANEL  — slides in from left, two-column layout (history | chat)
       ══════════════════════════════════════════════════════════════════════════ -->
  <div id="chat-panel" class="chat-panel">

    <!-- ── History column ─────────────────────────────────────────────── -->
    <div class="chat-history-col">
      <div class="history-top">
        <span class="history-label">Chats</span>
        <button class="new-chat-btn" id="new-chat-btn" title="New chat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New
        </button>
      </div>
      <div class="history-list" id="history-list">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- ── Active chat column ─────────────────────────────────────────── -->
    <div class="chat-main-col">

      <!-- header -->
      <div class="chat-main-header">
        <div class="chat-main-header-left">
          <span id="chat-context-badge" class="chat-ctx-badge" style="display:none"></span>
          <span id="chat-main-title" class="chat-main-title">New Chat</span>
        </div>
        <button class="chat-close-btn" id="chat-close-btn" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- messages -->
      <div class="chat-messages" id="chat-messages">
        <div class="chat-welcome" id="chat-welcome">
          <div class="chat-welcome-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div class="chat-welcome-text">Ask anything about your component library</div>
          <div class="chat-welcome-sub">Compare parts, find specs, get circuit ideas</div>
        </div>
      </div>

      <!-- typing indicator -->
      <div class="chat-typing" id="chat-typing" style="display:none">
        <span></span><span></span><span></span>
      </div>

      <!-- input -->
      <div class="chat-input-wrap">
        <div class="chat-input-box">
          <textarea id="chat-input" rows="1" placeholder="Ask about your components…"></textarea>
          <button id="chat-send-btn" title="Send (Enter)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="chat-input-hint">Enter to send · Shift+Enter for newline</div>
      </div>
    </div>
  </div>

  <!-- dim backdrop (click to close) -->
  <div id="chat-backdrop" class="chat-backdrop"></div>

  <!-- ── PDF Modal ─────────────────────────────────────────────────────────── -->
  <div id="pdf-modal" class="pdf-modal" style="display:none">
    <div class="pdf-modal-inner">
      <div class="pdf-modal-header">
        <span id="pdf-modal-title" class="pdf-modal-title">Datasheet</span>
        <div style="display:flex;gap:10px;align-items:center">
          <a id="pdf-modal-newlink" href="#" target="_blank" class="pdf-modal-link">Open in new tab ↗</a>
          <button class="icon-btn" onclick="closePdfModal()" title="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <iframe id="pdf-modal-iframe" src="" class="pdf-modal-iframe"></iframe>
    </div>
  </div>

  <!-- ── Page content ──────────────────────────────────────────────────────── -->
  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  CHAT PANEL
// ════════════════════════════════════════════════════════════════════════════

// Per-page context (injected by component_detail.html)
window.CURRENT_COMP_ID   = window.CURRENT_COMP_ID   || null;
window.CURRENT_COMP_PART = window.CURRENT_COMP_PART || null;
window.CURRENT_COMP_DS   = window.CURRENT_COMP_DS   || null;

// ── State ─────────────────────────────────────────────────────────────────
let panelOpen   = false;
let activeSid   = null;   // currently loaded session id
let isSending   = false;

// ── DOM refs ──────────────────────────────────────────────────────────────
const chatPanel      = document.getElementById("chat-panel");
const chatBackdrop   = document.getElementById("chat-backdrop");
const toggleBtn      = document.getElementById("chat-toggle-btn");
const closeBtn       = document.getElementById("chat-close-btn");
const newChatBtn     = document.getElementById("new-chat-btn");
const historyList    = document.getElementById("history-list");
const chatMessages   = document.getElementById("chat-messages");
const chatWelcome    = document.getElementById("chat-welcome");
const chatTyping     = document.getElementById("chat-typing");
const chatInput      = document.getElementById("chat-input");
const chatSendBtn    = document.getElementById("chat-send-btn");
const chatMainTitle  = document.getElementById("chat-main-title");
const chatCtxBadge   = document.getElementById("chat-context-badge");

// ── Panel open / close ────────────────────────────────────────────────────
function openPanel() {
  panelOpen = true;
  chatPanel.classList.add("open");
  chatBackdrop.classList.add("show");
  toggleBtn.classList.add("active");
  loadHistory();
  chatInput.focus();
}
function closePanel() {
  panelOpen = false;
  chatPanel.classList.remove("open");
  chatBackdrop.classList.remove("show");
  toggleBtn.classList.remove("active");
}

toggleBtn.addEventListener("click", () => panelOpen ? closePanel() : openPanel());
closeBtn.addEventListener("click", closePanel);
chatBackdrop.addEventListener("click", closePanel);
document.addEventListener("keydown", e => { if (e.key === "Escape" && panelOpen) closePanel(); });

// ── History list ──────────────────────────────────────────────────────────
async function loadHistory() {
  const res = await fetch("/api/sessions");
  const sessions = await res.json();
  renderHistory(sessions);
}

function renderHistory(sessions) {
  historyList.innerHTML = "";
  if (!sessions.length) {
    historyList.innerHTML = `<div class="history-empty">No chats yet.<br>Start one above!</div>`;
    return;
  }

  // Group by date
  const groups = {};
  sessions.forEach(s => {
    const d = new Date(s.updated_at || s.created_at);
    const label = dateBucket(d);
    if (!groups[label]) groups[label] = [];
    groups[label].push(s);
  });

  Object.entries(groups).forEach(([label, items]) => {
    const grp = document.createElement("div");
    grp.className = "history-group";
    grp.innerHTML = `<div class="history-group-label">${escHtml(label)}</div>`;
    items.forEach(s => grp.appendChild(makeHistoryItem(s)));
    historyList.appendChild(grp);
  });
}

function makeHistoryItem(s) {
  const el = document.createElement("div");
  el.className = "history-item" + (s.id === activeSid ? " active" : "");
  el.dataset.sid = s.id;

  const badge = s.component_part
    ? `<span class="hist-comp-badge">${escHtml(s.component_part)}</span>`
    : "";

  el.innerHTML = `
    <div class="history-item-body" onclick="openSession(${s.id})">
      ${badge}
      <div class="history-item-title">${escHtml(s.title || "Untitled")}</div>
    </div>
    <button class="history-del-btn" onclick="deleteSession(event,${s.id})" title="Delete">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    </button>
  `;
  return el;
}

function dateBucket(d) {
  const now = new Date();
  const diff = (now - d) / 86400000;
  if (diff < 1) return "Today";
  if (diff < 2) return "Yesterday";
  if (diff < 7) return "This week";
  if (diff < 30) return "This month";
  return d.toLocaleString("default", { month: "long", year: "numeric" });
}

// ── New chat ──────────────────────────────────────────────────────────────
newChatBtn.addEventListener("click", () => startNewSession(window.CURRENT_COMP_ID || null));

async function startNewSession(compId) {
  const res = await fetch("/api/sessions", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ component_id: compId }),
  });
  const s = await res.json();
  activeSid = s.id;
  clearMessages();
  updateHeader(s);
  loadHistory();
  chatInput.focus();
  return s;
}

// ── Open existing session ─────────────────────────────────────────────────
async function openSession(sid) {
  const [msgsRes, sessRes] = await Promise.all([
    fetch(`/api/sessions/${sid}/messages`),
    fetch("/api/sessions"),
  ]);
  const msgs = await msgsRes.json();
  const all  = await sessRes.json();
  const s    = all.find(x => x.id === sid) || { id: sid, title: "Chat" };

  activeSid = sid;
  clearMessages();
  updateHeader(s);
  msgs.forEach(m => appendMessage(m.role, m.content));
  chatMessages.scrollTop = chatMessages.scrollHeight;

  // Highlight active in history
  document.querySelectorAll(".history-item").forEach(el => {
    el.classList.toggle("active", Number(el.dataset.sid) === sid);
  });
}

function clearMessages() {
  chatMessages.innerHTML = "";
  chatMessages.appendChild(chatWelcome);
  chatWelcome.style.display = "flex";
}

function updateHeader(s) {
  chatMainTitle.textContent = s.title || "New Chat";
  if (s.component_part) {
    chatCtxBadge.textContent = s.component_part;
    chatCtxBadge.style.display = "inline-block";
  } else {
    chatCtxBadge.style.display = "none";
  }
}

// ── Send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const msg = chatInput.value.trim();
  if (!msg || isSending) return;

  // Create session if none
  if (!activeSid) {
    await startNewSession(window.CURRENT_COMP_ID || null);
  }

  chatWelcome.style.display = "none";
  isSending = true;
  chatInput.value = "";
  autoResizeInput();
  chatSendBtn.disabled = true;

  appendMessage("user", msg);

  // Typing indicator
  chatTyping.style.display = "flex";
  chatMessages.scrollTop = chatMessages.scrollHeight;

  const bodyEl = appendMessage("assistant", "");
  chatTyping.style.display = "none";

  try {
    const r = await fetch(`/api/sessions/${activeSid}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg }),
    });

    const reader = r.body.getReader();
    const dec    = new TextDecoder();
    let   acc    = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      acc += dec.decode(value, { stream: true });
      bodyEl.textContent = acc;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Refresh title (auto-set on first message)
    const sessRes = await fetch("/api/sessions");
    const all     = await sessRes.json();
    const s       = all.find(x => x.id === activeSid);
    if (s) { chatMainTitle.textContent = s.title; renderHistory(all); }

  } catch (err) {
    bodyEl.textContent = "[Error: " + err + "]";
    bodyEl.style.color = "var(--danger)";
  } finally {
    isSending = false;
    chatSendBtn.disabled = false;
    chatTyping.style.display = "none";
    chatInput.focus();
  }
}

chatSendBtn.addEventListener("click", sendMessage);
chatInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Delete session ────────────────────────────────────────────────────────
async function deleteSession(e, sid) {
  e.stopPropagation();
  await fetch(`/api/sessions/${sid}`, { method: "DELETE" });
  if (activeSid === sid) {
    activeSid = null;
    clearMessages();
    chatMainTitle.textContent = "New Chat";
    chatCtxBadge.style.display = "none";
  }
  loadHistory();
}

// ── Append message bubble ─────────────────────────────────────────────────
function appendMessage(role, content) {
  const row = document.createElement("div");
  row.className = "msg-row " + role;

  const avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  avatar.textContent = role === "user" ? "U" : "AI";

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";

  const body = document.createElement("div");
  body.className = "msg-body";
  body.textContent = content;

  bubble.appendChild(body);
  if (role === "user") {
    row.appendChild(bubble);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(bubble);
  }
  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return body;
}

// ── Auto-resize textarea ──────────────────────────────────────────────────
function autoResizeInput() {
  chatInput.style.height = "auto";
  chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + "px";
}
chatInput.addEventListener("input", autoResizeInput);

// ════════════════════════════════════════════════════════════════════════════
//  PDF MODAL
// ════════════════════════════════════════════════════════════════════════════
const pdfModal = document.getElementById("pdf-modal");

function openPdfModal(filename, title) {
  document.getElementById("pdf-modal-iframe").src = "/datasheets/" + filename;
  document.getElementById("pdf-modal-newlink").href = "/datasheets/" + filename;
  document.getElementById("pdf-modal-title").textContent = title || filename;
  pdfModal.style.display = "flex";
  document.body.style.overflow = "hidden";
}
function closePdfModal() {
  pdfModal.style.display = "none";
  document.getElementById("pdf-modal-iframe").src = "";
  document.body.style.overflow = "";
}
pdfModal.addEventListener("click", e => { if (e.target === pdfModal) closePdfModal(); });
document.addEventListener("keydown", e => {
  if (e.key === "Escape") { if (pdfModal.style.display !== "none") { closePdfModal(); return; } }
});

// ── Shared helpers ────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Expose globals ────────────────────────────────────────────────────────
window.openSession    = openSession;
window.deleteSession  = deleteSession;
window.openPdfModal   = openPdfModal;
window.closePdfModal  = closePdfModal;
window.openPanel      = openPanel;
window.startNewSession= startNewSession;
</script>
</body>
</html>
