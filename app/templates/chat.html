{% extends "base.html" %}
{% block content %}
<section class="chat-wrap">
  <h1>Hardware Assistant</h1>
  <p class="hint">Grounded on your local library. General suggestions are clearly labeled.</p>

  <div id="messages" class="messages"></div>

  <form id="chat-form" class="chat-form">
    <textarea id="input" rows="3" placeholder="Ask: 'precision op-amp for 4-20mA loop, single supply'…" required></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<script>
const messagesEl = document.getElementById("messages");
const form = document.getElementById("chat-form");
const input = document.getElementById("input");
const history = [];

function addMsg(role, content) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = `<div class="role">${role}</div><div class="content"></div>`;
  div.querySelector(".content").innerText = content;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div.querySelector(".content");
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const msg = input.value.trim();
  if (!msg) return;
  addMsg("user", msg);
  history.push({role: "user", content: msg});
  input.value = "";

  const target = addMsg("assistant", "");
  try {
    const r = await fetch("/api/chat/stream", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: msg, history: history.slice(0, -1)})
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let acc = "";
    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      acc += dec.decode(value, {stream: true});
      target.innerText = acc;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    history.push({role: "assistant", content: acc});
  } catch (err) {
    target.innerText = "[error: " + err + "]";
  }
});
</script>
{% endblock %}
